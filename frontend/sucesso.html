<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUcesso</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(135deg, #0f172a 0%, #3c74de 50%, #1e40af 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            padding: 20px;
            overflow-x: hidden;
        }

        .card{
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: clamp(25px, 8vw, 40px);
            border-radius: 24px;
            box-shadow: 
                0 20px 40px rgba(0, 0, 0, 0.2),
                0 0 0 1px rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 380px;
            position: relative;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card::before {
            content: '✅';
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            background: #10b981;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.4);
        }
        
        .card h1 {
            margin: 20px 0 15px 0;
            color: #059669;
            font-size: clamp(20px, 5vw, 28px);
            font-weight: 700;
            line-height: 1.3;
        }

        .card p {
            color: #64748b;
            font-size: clamp(14px, 4vw, 16px);
            margin: 0 0 30px 0;
            font-weight: 500;
        }
        
        button {
            width: 100%;
            padding: clamp(14px, 4vw, 18px);
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            color: white;
            font-size: clamp(16px, 4.5vw, 18px);
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        button:hover {
            background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(59, 130, 246, 0.4);
        }

        button:hover::before {
            left: 100%;
        }

        button:active {
            transform: translateY(0);
        }

        /* Responsivo aprimorado */
        @media (max-width: 480px) {
            body {
                padding: 15px;
                align-items: flex-start;
                padding-top: 80px;
            }
            
            .card {
                margin: 0 auto;
                border-radius: 20px;
                padding: 30px 25px;
            }
        }

        @media (max-width: 360px) {
            body {
                padding: 10px;
                padding-top: 70px;
            }
            
            .card {
                padding: 25px 20px;
            }
        }

        /* Modo escuro preferencial */
        @media (prefers-color-scheme: dark) {
            .card {
                background: rgba(30, 41, 59, 0.95);
                color: white;
            }
            
            .card h1 {
                color: #34d399;
            }
            
            .card p {
                color: #94a3b8;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Ocorrência enviada com sucesso!</h1>
        <p>Sua denúncia foi registrada.</p>
        <button onclick="window.location.replace('mapa.html')">Voltar ao Mapa</button>
    </div>
    <script>
        function voltarInicio() {
            window.location.href = "mapa.html";
        }
    </script>
</body>
</html>
