<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - UrbanSense</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 30%, #3b82f6 70%, #60a5fa 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 300px;
            background: 
                radial-gradient(circle at 20% 20%, rgba(255,255,255,0.2) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255,255,255,0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(25px) saturate(180%);
            padding: clamp(35px, 9vw, 50px);
            border-radius: 32px;
            box-shadow: 
                0 30px 60px rgba(0, 0, 0, 0.25),
                0 0 0 1px rgba(255, 255, 255, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.5);
            width: 100%;
            max-width: 400px;
            position: relative;
            animation: loginSlideUp 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 1;
        }

        @keyframes loginSlideUp {
            0% {
                opacity: 0;
                transform: scale(0.7) translateY(50px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .card::before {
            content: '🔐';
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 12px 30px rgba(59, 130, 246, 0.5);
            z-index: 2;
        }
        
        .card h1 {
            margin: 25px 0 35px 0;
            color: #1e40af;
            font-size: clamp(26px, 7vw, 36px);
            font-weight: 800;
            line-height: 1.2;
            letter-spacing: -0.5px;
            position: relative;
        }

        .card h1::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 4px;
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
            border-radius: 2px;
        }

        /* Formulário */
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 22px;
        }
        
        .card input {
            width: 100%;
            padding: clamp(18px, 5vw, 22px);
            margin: 0;
            border: 2px solid #e2e8f0;
            border-radius: 20px;
            outline: none;
            font-size: clamp(16px, 4.2vw, 18px);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            font-weight: 500;
            font-family: inherit;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: #1e293b;
        }

        .card input::placeholder {
            color: #94a3b8;
            font-weight: 500;
        }

        .card input:focus {
            border-color: #3b82f6;
            box-shadow: 
                0 0 0 4px rgba(59, 130, 246, 0.15),
                0 8px 25px rgba(59, 130, 246, 0.2);
            transform: translateY(-2px);
            background: black;
        }

        /* Botão principal */
        button {
            width: 100%;
            padding: clamp(18px, 5vw, 22px);
            border: none;
            border-radius: 20px;
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 50%, #1e40af 100%);
            color: white;
            font-size: clamp(16px, 4.5vw, 18px);
            font-weight: 700;
            letter-spacing: 0.5px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            cursor: pointer;
            min-height: 60px;
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.7s;
        }

        button:hover {
            background: linear-gradient(135deg, #2563eb 0%, #1e40af 50%, #1e3a8a 100%);
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 20px 45px rgba(59, 130, 246, 0.6);
        }

        button:hover::before {
            left: 100%;
        }

        button:active {
            transform: translateY(-2px) scale(0.98);
            transition: transform 0.1s;
        }

        /* Links adicionais */
        .links {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .links a {
            color: #3b82f6;
            text-decoration: none;
            font-size: clamp(14px, 3.8vw, 15px);
            font-weight: 500;
            transition: color 0.2s;
        }

        .links a:hover {
            color: #1d4ed8;
        }

        /* Responsivo */
        @media (max-width: 480px) {
            body {
                padding: 15px;
                justify-content: center;
                padding-top: 100px;
            }
            
            .card {
                margin: 20px 0;
                border-radius: 28px;
                padding: 40px 30px;
            }
        }

        @media (max-width: 360px) {
            body {
                padding: 12px;
                padding-top: 90px;
            }
            
            .card {
                padding: 35px 25px;
            }
        }

        /* Dark mode */
        @media (prefers-color-scheme: dark) {
            .card {
                background: rgba(30, 41, 59, 0.97);
                color: #f1f5f9;
            }
            
            .card h1 {
                color: #60a5fa;
            }
            
            .card input {
                background: rgba(51, 65, 85, 0.9);
                border-color: #475569;
                color: #f1f5f9;
            }
            
            .card input::placeholder {
                color: #94a3b8;
            }
        }

        /* Acessibilidade */
        button:focus, input:focus {
            outline: 3px solid #60a5fa;
            outline-offset: 2px;
        }

        /* Loading state */
        button.loading {
            pointer-events: none;
            opacity: 0.8;
        }

        button.loading::after {
            content: ' 🔄';
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Login</h1>  
        
        <form class="login-form" onsubmit="entrar(event)">
            <input type="text" placeholder="👤 Usuário" required>
            <input type="password" placeholder="🔒 Senha" required>
            <button type="submit">Entrar na Plataforma</button>
        </form>

        <div class="links">
            <a href="#">Esqueceu a senha?</a>
            <a href="CriarConta.html">Criar conta</a>
        </div>
    </div>

    <script>
        function entrar(event) {
            event.preventDefault();
            const button = event.target.querySelector('button');
            button.textContent = 'Entrando...';
            button.classList.add('loading');
            
            // Simula delay de login
            setTimeout(() => {
                window.location.href = "mapa.html";
            }, 1500);
        }
    </script>
</body>
</html>
