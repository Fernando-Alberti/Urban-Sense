<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportar Ocorrência</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(135deg, #0f172a 0%, #3c74de 40%, #1e40af 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 200px;
            background: radial-gradient(circle at 30% 20%, rgba(255,255,255,0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            padding: clamp(30px, 8vw, 50px);
            border-radius: 28px;
            box-shadow: 
                0 25px 50px rgba(0, 0, 0, 0.25),
                0 0 0 1px rgba(255, 255, 255, 0.2);
            width: 100%;
            max-width: 420px;
            position: relative;
            animation: slideUp 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .card::before {
            content: '📍';
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4);
        }
        
        .card h1 {
            margin: 20px 0 30px 0;
            color: #059669;
            font-size: clamp(24px, 6vw, 32px);
            font-weight: 700;
            line-height: 1.3;
        }

        /* Formulário moderno */
        #form-ocorrencia {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        input {
            width: 100%;
            padding: clamp(16px, 4.5vw, 20px);
            border: 2px solid #e5e7eb;
            border-radius: 16px;
            outline: none;
            font-size: clamp(16px, 4vw, 18px);
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: inherit;
        }

        input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
            transform: translateY(-1px);
            background: rgb(0, 0, 0);
        }

        input::placeholder {
            color: #9ca3af;
            font-weight: 500;
        }

        /* Container dos botões */
        .buttons-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-top: 10px;
        }
        
        button {
            padding: clamp(16px, 4.5vw, 20px);
            border: none;
            border-radius: 16px;
            font-size: clamp(16px, 4vw, 18px);
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            cursor: pointer;
            min-height: 56px;
            touch-action: manipulation;
        }

        button[type="submit"] {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.4);
        }

        button[type="submit"]:hover {
            background: linear-gradient(135deg, #059669 0%, #047857 100%);
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(16, 185, 129, 0.6);
        }

        button[onclick] {
            background: linear-gradient(135deg, #6b7280 0%, #4b5563 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(107, 114, 128, 0.4);
        }

        button[onclick]:hover {
            background: linear-gradient(135deg, #4b5563 0%, #374151 100%);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(107, 114, 128, 0.6);
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.6s;
        }

        button:hover::before {
            left: 100%;
        }

        button:active {
            transform: translateY(0) scale(0.98);
        }

        #resultado {
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            font-weight: 500;
            min-height: 20px;
        }

        /* Responsivo aprimorado */
        @media (max-width: 480px) {
            body {
                padding: 15px;
                justify-content: flex-start;
                padding-top: 80px;
            }
            
            .card {
                margin: 20px 0;
                border-radius: 24px;
                padding: 35px 25px;
            }
        }

        @media (max-width: 360px) {
            body {
                padding: 12px;
                padding-top: 70px;
            }
            
            .card {
                padding: 30px 20px;
            }
        }

        /* Dark mode */
        @media (prefers-color-scheme: dark) {
            .card {
                background: rgba(30, 41, 59, 0.95);
                color: white;
            }
            
            .card h1 {
                color: #34d399;
            }
            
            input {
                background: rgba(51, 65, 85, 0.8);
                border-color: #475569;
                color: white;
            }
            
            input::placeholder {
                color: #94a3b8;
            }
        }

        /* Acessibilidade */
        button:focus, input:focus {
            outline: 2px solid #60a5fa;
            outline-offset: 2px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Reportar Ocorrência</h1>
        <form id="form-ocorrencia" onsubmit="enviarOcorrencia(event)">
            <input type="text" id="tipo" placeholder="Tipo da ocorrência (ex: buraco na rua, pichação...)" required />
            <input type="text" id="descricao" placeholder="Descrição detalhada" />
            <div class="buttons-container">
                <button type="submit">📤 Enviar Ocorrência</button>
                <button onclick="window.location.href='mapa.html'">↩️ Voltar ao Mapa</button>
            </div>
        </form>
    
        <p id="resultado"></p>
    </div>

   <script>
async function pegarCidade(lat, lon) {
    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);
    const data = await res.json();

    return data.address.city || data.address.town || data.address.village || "Cidade desconhecida";
}

async function enviarOcorrencia(event) {
    event.preventDefault();

    const tipo = document.getElementById('tipo').value;
    const descricao = document.getElementById('descricao').value;

    // pegar do localStorage (mesmo nome usado no mapa!)
    let lat = localStorage.getItem('userLat');
    let lon = localStorage.getItem('userLon');

    if (!lat || !lon) {
        alert("Localização não encontrada. Volte ao mapa.");
        return;
    }

    // converter pra número
    lat = parseFloat(lat);
    lon = parseFloat(lon);

    try {
        const cidade = await pegarCidade(lat, lon);

        console.log("Cidade:", cidade);
        console.log("Lat:", lat, "Lon:", lon);

        const response = await fetch("http://127.0.0.1:8000/ocorrencia", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                tipo: tipo,
                descricao: descricao,
                lat: lat,
                lon: lon,
                cidade: cidade
            })
        });

        const data = await response.json();
        console.log("Resposta do backend:", data);

        if (response.ok) {
            window.location.href = "sucesso.html";
        } else {
            alert("Erro ao enviar ocorrência");
        }

    } catch (err) {
        console.error("Erro no envio:", err);
        alert("Erro ao enviar ocorrência");
    }
}
</script>
</body>
</html>
