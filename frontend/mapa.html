<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UrbanSense</title>
    <style>
    * {
        box-sizing: border-box;
    }

    html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        overflow-x: hidden;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
    }

    /* mapa sempre no fundo */
    #map {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100dvh;
        z-index: 0;
    }

    /* header por cima do mapa - HEADER MODERNO */
    .header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        width: 100%;
        z-index: 9999;

        display: flex;
        justify-content: center;
        align-items: center;
        gap: clamp(8px, 3vw, 12px);
        padding: clamp(12px, 4vw, 20px) clamp(16px, 5vw, 24px);

        background: rgba(0, 0, 0, 0.85);
        backdrop-filter: blur(20px) saturate(180%);
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        
        animation: slideDown 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes slideDown {
        from {
            transform: translateY(-100%);
            opacity: 0;
        }
        to {
            transform: translateY(0);
            opacity: 1;
        }
    }

    /* Container dos botões para responsividade */
    .buttons-container {
        display: flex;
        flex-wrap: wrap;
        gap: clamp(8px, 2.5vw, 12px);
        justify-content: center;
        max-width: 100%;
    }

    /* botões MODERNOS E RESPONSIVOS */
    button {
        padding: clamp(12px, 4vw, 16px) clamp(20px, 6vw, 28px);
        border: none;
        border-radius: 16px;
        background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
        color: white;
        font-size: clamp(14px, 4vw, 16px);
        font-weight: 600;
        letter-spacing: 0.5px;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
        overflow: hidden;
        min-height: 48px;
        min-width: 140px;
        cursor: pointer;
        user-select: none;
        touch-action: manipulation;
        box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
    }

    button::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
        transition: left 0.6s;
    }

    button:hover {
        background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
        transform: translateY(-2px) scale(1.02);
        box-shadow: 0 8px 25px rgba(59, 130, 246, 0.6);
    }

    button:hover::before {
        left: 100%;
    }

    button:active {
        transform: translateY(0) scale(0.98);
        transition: transform 0.1s;
    }

    /* Info estilizada */
    .info {
        position: absolute;
        right: clamp(16px, 5vw, 24px);
        top: 50%;
        transform: translateY(-50%);
        background: rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(10px);
        padding: 8px 16px;
        border-radius: 20px;
        color: white;
        font-size: clamp(12px, 3.5vw, 14px);
        font-weight: 500;
        white-space: nowrap;
        border: 1px solid rgba(255, 255, 255, 0.2);
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    /* Responsivo para telas muito pequenas */
    @media (max-width: 480px) {
        .header {
            padding: 16px 12px;
            flex-direction: column;
            gap: 12px;
        }
        
        .buttons-container {
            width: 100%;
            flex-direction: column;
            gap: 10px;
        }
        
        button {
            width: 100%;
            max-width: 280px;
            padding: 16px 20px;
        }
        
        .info {
            position: static;
            transform: none;
            order: 3;
            margin-top: 8px;
        }
    }

    @media (max-width: 360px) {
        .header {
            padding: 14px 10px;
        }
        
        button {
            font-size: 16px;
            padding: 18px 16px;
        }
    }

    /* Orientação landscape em celular */
    @media (max-height: 500px) and (orientation: landscape) {
        .header {
            padding: 8px 12px;
            gap: 8px;
        }
        
        button {
            padding: 10px 16px;
            font-size: 14px;
            min-height: 44px;
        }
    }

    /* Dark mode aprimorado */
    @media (prefers-color-scheme: dark) {
        .header {
            background: rgba(17, 24, 39, 0.95);
        }
    }

    /* Foco para acessibilidade */
    button:focus {
        outline: 2px solid #60a5fa;
        outline-offset: 2px;
    }
    </style>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
    <div class="header">
        <div class="buttons-container">
            <button onclick="irReportarOcorrencia()">
                 Reportar Ocorrência
            </button>
            <button onclick="irVerOcorrencias()">
                 Ver Ocorrências
            </button>
        </div>
        <div class="info" id="info"></div>
    </div>
    <div id="map"></div>
    
  <script>
    let userLat = null;
    let userLon = null;

    function irReportarOcorrencia() {
        navigator.geolocation.getCurrentPosition((pos) => {
            userLat = pos.coords.latitude;
            userLon = pos.coords.longitude;
            localStorage.setItem("userLat", userLat);
            localStorage.setItem("userLon", userLon);
            window.location.href = "ReportarOcorrencia.html";
        });
    }

    function irVerOcorrencias() {
        window.location.href = "VerOcorrencias.html";
    }

    async function carregarMapa() {
        navigator.geolocation.getCurrentPosition(async (pos) => {

            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;

            localStorage.setItem("userLat", lat);
            localStorage.setItem("userLon", lon);

            userLat = lat;
            userLon = lon;

            console.log("Precisão:", pos.coords.accuracy, "metros");

            map.setView([lat, lon], 16);

            // limpa marcadores antigos
            map.eachLayer(layer => {
                if (layer instanceof L.Marker) {
                    map.removeLayer(layer);
                }
            });

            const userIcon = L.icon({
                iconUrl: 'https://maps.google.com/mapfiles/ms/icons/blue-dot.png',
                iconSize: [32, 32],
                iconAnchor: [16, 32]
            });

            L.marker([lat, lon], { icon: userIcon })
                .addTo(map)
                .bindPopup("Você está aqui");

            // 🔥 FETCH
            const res = await fetch(
                `http://127.0.0.1:8000/dados-mapa?lat=${lat}&lon=${lon}&raio=150`
            );

            const data = await res.json();

            console.log(data);

            // =========================
            // 🔥 PARTE CORRIGIDA AQUI
            // =========================

            let perto = 0;
            let medio = 0;
            let longe = 0;

            data.ocorrencias_proximas.forEach(o => {
                if (o.distancia <= 0.5) {
                    perto++;
                } else if (o.distancia <= 1) {
                    medio++;
                } else {
                    longe++;
                }
            });

            function cor(qtd) {
                if (qtd >= 3) return "red";
                if (qtd >= 1) return "orange";
                return "green";
            }

            const corPerto = cor(perto);
            const corMedio = cor(medio);
            const corLonge = cor(longe);

            // remove círculos antigos
            if (window.circulos) {
                window.circulos.forEach(c => map.removeLayer(c));
            }

            window.circulos = [];

            // 🔴 500m
            window.circulos.push(
                L.circle([lat, lon], {
                    radius: 500,
                    color: corPerto,
                    fillOpacity: 0.2
                }).addTo(map)
            );

            // 🟡 1000m
            window.circulos.push(
                L.circle([lat, lon], {
                    radius: 1000,
                    color: corMedio,
                    fillOpacity: 0.15
                }).addTo(map)
            );

            // 🟢 2000m
            window.circulos.push(
                L.circle([lat, lon], {
                    radius: 2000,
                    color: corLonge,
                    fillOpacity: 0.1
                }).addTo(map)
            );

            // =========================

            const ocorrenciaIcon = L.icon({
                iconUrl: 'https://maps.google.com/mapfiles/ms/icons/red-dot.png',
                iconSize: [32, 32],
                iconAnchor: [16, 32]
            });

            data.ocorrencias_proximas.forEach(o => {
                L.marker([o.lat, o.lon], { icon: ocorrenciaIcon })
                    .addTo(map)
                    .bindPopup(`
                        <b>${o.tipo}</b><br>
                        ${o.descricao}<br>
                        ${o.distancia} km
                    `);
            });

            document.getElementById("info").innerText =
                `Ocorrências próximas: ${data.resumo.proximas}`;
        });
    }

    const map = L.map('map').setView([0, 0], 2);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    carregarMapa();
</script>
</body>
</html>
